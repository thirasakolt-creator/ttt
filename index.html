<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VOL CTRL">
<meta name="theme-color" content="#0a0a0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>VOL CTRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #111116;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #ff4f4f;
    --accent3: #47c8ff;
    --text: #d4d4e0;
    --dim: #55556a;
    --glow: rgba(232,255,71,0.15);
    --fader-h: 320px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }

  /* ─── HEADER ─────────────────────────────── */
  .header {
    width: 100%;
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .header-sub {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .status-dot.error  { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

  /* ─── IP SETUP ────────────────────────────── */
  .setup-bar {
    width: 100%;
    max-width: 520px;
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .ip-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    letter-spacing: 1px;
  }
  .ip-input:focus { border-color: var(--accent); }
  .connect-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .connect-btn:active { opacity: 0.7; }

  /* ─── TAB BAR ────────────────────────────── */
  .tab-bar {
    width: 100%;
    max-width: 520px;
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--panel);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 6px;
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn:active { opacity: 0.7; }

  /* ─── VIEWS ──────────────────────────────── */
  .view { display: none; flex: 1; width: 100%; min-height: 0; overflow: hidden; }
  .view.active { display: flex; }

  /* ═══════════════════════════════════════════
     MASTER VIEW
  ═══════════════════════════════════════════ */
  .main-area {
    flex: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: stretch;
    gap: 0;
    padding: 16px 20px 12px;
    min-height: 0;
    flex-direction: column;
  }

  .fader-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .vol-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--dim);
    flex-shrink: 0;
  }
  .vol-number {
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    color: var(--accent);
    text-shadow: 0 0 50px var(--glow);
    transition: color 0.3s;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .vol-number.muted { color: var(--accent2); text-shadow: 0 0 40px rgba(255,79,79,0.2); }
  .vol-pct { font-size: 22px; font-weight: 300; color: var(--dim); vertical-align: super; letter-spacing: 0; }

  .master-row {
    flex: 1;
    display: flex;
    align-items: stretch;
    gap: 0;
    min-height: 0;
    width: 100%;
  }

  .fader-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .fader-track {
    position: relative;
    width: 56px;
    height: 100%;
    min-height: 160px;
    max-height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .fader-bg {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 20px; bottom: 20px;
    width: 6px;
    background: var(--border);
    border-radius: 3px;
  }
  .fader-fill {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 20px;
    width: 6px;
    background: var(--accent);
    border-radius: 3px;
    transition: height 0.08s ease-out, background 0.3s;
    pointer-events: none;
  }
  .fader-fill.muted { background: var(--accent2); }
  .fader-ticks {
    position: absolute;
    top: 20px; bottom: 20px;
    left: calc(50% + 10px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }
  .tick { display: flex; align-items: center; gap: 4px; }
  .tick-line { width: 6px; height: 1px; background: var(--border); }
  .tick-label { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--dim); letter-spacing: 0; line-height: 1; }
  .fader-handle {
    position: absolute;
    left: 50%;
    transform: translateX(-50%) translateY(50%);
    bottom: 20px;
    width: 48px; height: 24px;
    background: var(--text);
    border-radius: 3px;
    cursor: grab;
    transition: background 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .handle-lines { display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
  .handle-line { width: 22px; height: 1px; background: rgba(10,10,12,0.6); border-radius: 1px; }
  .fader-handle.dragging { background: var(--accent); box-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); cursor: grabbing; }
  .fader-handle.muted { background: var(--accent2); }

  .right-panel {
    width: 110px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-left: 16px;
  }
  .seg-bar-v { display: flex; flex-direction: column-reverse; gap: 3px; flex: 1; }
  .seg-v { width: 100%; flex: 1; background: var(--border); border-radius: 1px; transition: background 0.1s; }
  .seg-v.active { background: var(--accent); }
  .seg-v.active.high { background: var(--accent2); }

  .presets-v { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; margin-top: 12px; }
  .presets-label-v { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--dim); margin-bottom: 2px; }
  .btn-preset-v {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 8px 6px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
    text-align: center;
    width: 100%;
  }
  .btn-preset-v span { font-size: 10px; font-weight: 300; }
  .btn-preset-v:active { background: #16161e; border-color: var(--accent); color: var(--accent); transform: scale(0.97); }

  /* ─── BOTTOM BAR ─────────────────────────── */
  .bottom-bar {
    width: 100%;
    max-width: 520px;
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .vol-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-align: center;
    min-height: 16px;
    transition: color 0.3s;
  }
  .vol-status.muted { color: var(--accent2); }
  .btn-mute {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 17px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-mute .mute-icon { font-size: 20px; }
  .btn-mute.is-muted { border-color: var(--accent2); color: var(--accent2); background: rgba(255,79,79,0.06); }
  .btn-mute:active { transform: scale(0.98); opacity: 0.8; }

  /* ═══════════════════════════════════════════
     APPS VIEW
  ═══════════════════════════════════════════ */
  #view-apps {
    flex-direction: column;
    align-items: center;
  }

  .apps-toolbar {
    width: 100%;
    max-width: 520px;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .apps-toolbar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
  }
  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-refresh:active { color: var(--accent); border-color: var(--accent); }

  .apps-list {
    flex: 1;
    width: 100%;
    max-width: 520px;
    overflow-y: auto;
    padding: 12px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .apps-list::-webkit-scrollbar { width: 3px; }
  .apps-list::-webkit-scrollbar-track { background: transparent; }
  .apps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .app-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .app-card.muted-card { border-color: rgba(255,79,79,0.3); }

  .app-icon {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .app-icon img { width: 100%; height: 100%; object-fit: contain; }

  .app-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .app-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .app-name {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
    text-transform: uppercase;
  }
  .app-vol-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    flex-shrink: 0;
    min-width: 40px;
    text-align: right;
  }
  .app-vol-display.muted { color: var(--accent2); }

  /* Horizontal slider for each app */
  .app-slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    outline: none;
    border-radius: 2px;
    cursor: pointer;
  }
  .app-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 2px;
    background: var(--text);
    cursor: grab;
    transition: background 0.15s;
  }
  .app-slider:active::-webkit-slider-thumb { background: var(--accent); cursor: grabbing; }
  .app-slider.muted-slider::-webkit-slider-thumb { background: var(--accent2); }

  .app-mute-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 14px;
    width: 32px; height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.12s;
  }
  .app-mute-btn.is-muted { border-color: var(--accent2); background: rgba(255,79,79,0.08); }
  .app-mute-btn:active { transform: scale(0.92); }

  .apps-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
  }
  .apps-empty-icon { font-size: 40px; opacity: 0.3; }

  /* ─── TOAST ───────────────────────────────── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 8px 20px;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(.16,1,.3,1);
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">AUDIO SYSTEM</div>
    <div class="header-sub">VOL CTRL</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- IP Setup -->
<div class="setup-bar">
  <input class="ip-input" id="ipInput" type="text"
    placeholder="192.168.x.x:7788"
    autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="connect-btn" onclick="connect()">CONN</button>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-master" onclick="switchTab('master')">MASTER</button>
  <button class="tab-btn" id="tab-apps" onclick="switchTab('apps')">APPS</button>
</div>

<!-- ══════ MASTER VIEW ══════ -->
<div class="view active" id="view-master">
  <div class="main-area">
    <div class="fader-col">
      <div class="vol-label">MASTER VOL</div>
      <div class="vol-number" id="volNum">--<span class="vol-pct">%</span></div>
      <div class="master-row">
        <div class="fader-wrap">
          <div class="fader-track" id="faderTrack">
            <div class="fader-bg"></div>
            <div class="fader-fill" id="faderFill"></div>
            <div class="fader-ticks" id="faderTicks"></div>
            <div class="fader-handle" id="faderHandle">
              <div class="handle-lines">
                <div class="handle-line"></div>
                <div class="handle-line"></div>
                <div class="handle-line"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="seg-bar-v" id="segBarV"></div>
          <div class="presets-v">
            <div class="presets-label-v">PRESET</div>
            <button class="btn-preset-v" onclick="setVol(25)">25<span>%</span></button>
            <button class="btn-preset-v" onclick="setVol(50)">50<span>%</span></button>
            <button class="btn-preset-v" onclick="setVol(75)">75<span>%</span></button>
            <button class="btn-preset-v" onclick="setVol(100)">100<span>%</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom bar (master only) -->
<div class="bottom-bar" id="masterBottomBar">
  <div class="vol-status" id="volStatus">DISCONNECTED</div>
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">
    <span class="mute-icon" id="muteIcon">🔊</span>
    <span id="muteLabel">MUTE</span>
  </button>
</div>

<!-- ══════ APPS VIEW ══════ -->
<div class="view" id="view-apps">
  <div class="apps-toolbar">
    <div class="apps-toolbar-label">APPLICATION VOLUMES</div>
    <button class="btn-refresh" onclick="loadApps()">↻ REFRESH</button>
  </div>
  <div class="apps-list" id="appsList">
    <div class="apps-empty">
      <div class="apps-empty-icon">🎚️</div>
      <div>CONNECT FIRST</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ State ══════════════════════════════════════
let serverURL = "";
let curVol = 0;
let isMuted = false;
let pollTimer = null;
let appPollTimer = null;
let currentTab = 'master';
let appVolTimers = {};

// ══ Tab switching ═══════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-master').classList.toggle('active', tab === 'master');
  document.getElementById('view-apps').classList.toggle('active', tab === 'apps');
  document.getElementById('masterBottomBar').style.display = tab === 'master' ? 'flex' : 'none';
  document.getElementById('tab-master').classList.toggle('active', tab === 'master');
  document.getElementById('tab-apps').classList.toggle('active', tab === 'apps');

  if (tab === 'apps') {
    loadApps();
    startAppPolling();
  } else {
    stopAppPolling();
  }
}

// ══ Init vertical segments ═════════════════════
const segBarV = document.getElementById("segBarV");
const SEG_COUNT = 16;
for (let i = 0; i < SEG_COUNT; i++) {
  const s = document.createElement("div");
  s.className = "seg-v";
  s.id = "segV" + i;
  segBarV.appendChild(s);
}

// ══ Init fader ticks ════════════════════════════
const ticksEl = document.getElementById("faderTicks");
[100, 75, 50, 25, 0].forEach(v => {
  const t = document.createElement("div");
  t.className = "tick";
  t.innerHTML = `<div class="tick-line"></div><div class="tick-label">${v}</div>`;
  ticksEl.appendChild(t);
});

// ══ Master Fader logic ══════════════════════════
const faderTrack  = document.getElementById("faderTrack");
const faderHandle = document.getElementById("faderHandle");
const faderFill   = document.getElementById("faderFill");

let dragging = false, dragStartY = 0, dragStartVol = 0;

function getTrackBounds() {
  const rect = faderTrack.getBoundingClientRect();
  const pad = 20;
  return { top: rect.top + pad, bottom: rect.bottom - pad, height: rect.height - pad * 2 };
}

function updateFaderPosition(vol) {
  const bounds = getTrackBounds();
  const fillH = bounds.height * (vol / 100);
  faderFill.style.height = fillH + "px";
  const handleBottom = 20 + fillH - 12;
  faderHandle.style.bottom = handleBottom + "px";
  faderHandle.style.transform = "translateX(-50%)";
}

function startDrag(clientY) { dragging = true; dragStartY = clientY; dragStartVol = curVol; faderHandle.classList.add("dragging"); }
function moveDrag(clientY) {
  if (!dragging) return;
  const bounds = getTrackBounds();
  const dy = dragStartY - clientY;
  const delta = (dy / bounds.height) * 100;
  let newVol = Math.round(Math.max(0, Math.min(100, dragStartVol + delta)));
  if (newVol !== curVol) { curVol = newVol; renderVolUI(curVol, isMuted); sendVolDebounced(newVol); }
}
function endDrag() { if (!dragging) return; dragging = false; faderHandle.classList.remove("dragging"); }

faderTrack.addEventListener("touchstart", e => { e.preventDefault(); startDrag(e.touches[0].clientY); }, { passive: false });
faderTrack.addEventListener("touchmove",  e => { e.preventDefault(); moveDrag(e.touches[0].clientY); }, { passive: false });
faderTrack.addEventListener("touchend",   e => { e.preventDefault(); endDrag(); sendVolNow(curVol); }, { passive: false });
faderTrack.addEventListener("mousedown",  e => startDrag(e.clientY));
window.addEventListener("mousemove", e => { if (dragging) moveDrag(e.clientY); });
window.addEventListener("mouseup",   () => { if (dragging) { endDrag(); sendVolNow(curVol); } });

// ══ Debounce volume send ════════════════════════
let volSendTimer = null;
function sendVolDebounced(v) { clearTimeout(volSendTimer); volSendTimer = setTimeout(() => sendVolNow(v), 120); }
async function sendVolNow(v) { const data = await apiFetch(`/set?v=${v}`); if (data) updateUI(data, true); }

// ══ Helpers ═════════════════════════════════════
function getBase() {
  let v = document.getElementById("ipInput").value.trim();
  if (!v) return null;
  if (!v.startsWith("http")) v = "http://" + v;
  return v.replace(/\/$/, "");
}

async function apiFetch(path) {
  const base = getBase();
  if (!base) { showToast("กรอก IP ก่อน", true); return null; }
  try {
    const res = await fetch(base + path, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch (e) {
    setOffline();
    return null;
  }
}

function renderVolUI(vol, muted) {
  const numEl = document.getElementById("volNum");
  numEl.innerHTML = vol + '<span class="vol-pct">%</span>';
  numEl.className = "vol-number" + (muted ? " muted" : "");
  faderFill.className = "fader-fill" + (muted ? " muted" : "");
  faderHandle.className = "fader-handle" + (dragging ? " dragging" : "") + (muted ? " muted" : "");
  updateFaderPosition(vol);
  const active = Math.round((vol / 100) * SEG_COUNT);
  for (let i = 0; i < SEG_COUNT; i++) {
    document.getElementById("segV" + i).className = "seg-v" + (i < active ? (" active" + (i >= 12 ? " high" : "")) : "");
  }
}

function updateUI(data, skipFaderAnim) {
  if (!data) return;
  curVol = data.volume; isMuted = data.muted;
  renderVolUI(curVol, isMuted);
  const muteBtn   = document.getElementById("muteBtn");
  const muteIcon  = document.getElementById("muteIcon");
  const muteLabel = document.getElementById("muteLabel");
  if (isMuted) { muteBtn.classList.add("is-muted"); muteIcon.textContent = "🔇"; muteLabel.textContent = "UNMUTE"; }
  else         { muteBtn.classList.remove("is-muted"); muteIcon.textContent = "🔊"; muteLabel.textContent = "MUTE"; }
  const statusEl = document.getElementById("volStatus");
  statusEl.textContent = isMuted ? "MUTED" : "LIVE";
  statusEl.className = "vol-status" + (isMuted ? " muted" : "");
  setOnline();
}

function setOnline()  { document.getElementById("statusDot").className = "status-dot online"; }
function setOffline() { document.getElementById("statusDot").className = "status-dot error"; document.getElementById("volStatus").textContent = "OFFLINE"; }

let toastTimer;
function showToast(msg, isErr = false) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast"; }, 1800);
}

// ══ Connect ══════════════════════════════════════
async function connect() {
  const base = getBase();
  if (!base) { showToast("กรอก IP:PORT ก่อน", true); return; }
  localStorage.setItem("vol_server", document.getElementById("ipInput").value.trim());
  const data = await apiFetch("/status");
  if (data) { updateUI(data); showToast("เชื่อมต่อแล้ว"); startPolling(); }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (currentTab === 'master') { const data = await apiFetch("/status"); if (data) updateUI(data); }
  }, 2000);
}

// ══ Volume actions ───────────────────────────────
async function volUp(step)   { const data = await apiFetch(`/up?step=${step}`);   if (data) { updateUI(data); showToast(`+${step}`); } }
async function volDown(step) { const data = await apiFetch(`/down?step=${step}`); if (data) { updateUI(data); showToast(`-${step}`); } }
async function setVol(v)     { const data = await apiFetch(`/set?v=${v}`);        if (data) { updateUI(data); showToast(`SET ${v}%`); } }
async function toggleMute()  { const data = await apiFetch("/toggle_mute");       if (data) { updateUI(data); showToast(data.muted ? "MUTED" : "UNMUTED"); } }

// ══ APPS per-application volume ══════════════════

const APP_ICONS = {
  chrome: '🌐', firefox: '🦊', msedge: '🌐', opera: '🎭',
  spotify: '🎵', vlc: '📺', wmplayer: '🎵', groove: '🎵', itunes: '🎵',
  discord: '💬', teams: '💼', zoom: '📹', skype: '📞',
  youtube: '▶️', netflix: '🎬',
  default: '🔊'
};

function getAppIcon(name) {
  const n = name.toLowerCase();
  for (const [key, icon] of Object.entries(APP_ICONS)) {
    if (n.includes(key)) return icon;
  }
  return APP_ICONS.default;
}

async function loadApps() {
  const data = await apiFetch("/apps");
  if (!data) return;
  renderApps(data.apps || []);
}

function renderApps(apps) {
  const list = document.getElementById("appsList");
  if (!apps || apps.length === 0) {
    list.innerHTML = `<div class="apps-empty"><div class="apps-empty-icon">🔇</div><div>NO ACTIVE APPS</div></div>`;
    return;
  }

  // Keep existing DOM cards if possible (preserve slider focus)
  const existingIds = new Set([...list.querySelectorAll('.app-card')].map(el => el.dataset.pid));
  const newIds = new Set(apps.map(a => String(a.pid)));

  // Remove cards that no longer exist
  list.querySelectorAll('.app-card').forEach(el => {
    if (!newIds.has(el.dataset.pid)) el.remove();
  });

  // Remove empty state
  const empty = list.querySelector('.apps-empty');
  if (empty) empty.remove();

  apps.forEach(app => {
    const pid = String(app.pid);
    let card = list.querySelector(`.app-card[data-pid="${pid}"]`);

    if (!card) {
      card = document.createElement('div');
      card.className = 'app-card';
      card.dataset.pid = pid;
      card.innerHTML = `
        <div class="app-icon">${getAppIcon(app.name)}</div>
        <div class="app-info">
          <div class="app-name-row">
            <div class="app-name" title="${app.name}">${app.name}</div>
            <div class="app-vol-display" id="apvol-${pid}">${app.volume}%</div>
          </div>
          <div class="app-slider-row">
            <input type="range" class="app-slider" id="apslider-${pid}"
              min="0" max="100" value="${app.volume}"
              oninput="onAppSliderInput(this, '${pid}')"
              onchange="onAppSliderChange(this, '${pid}')">
            <button class="app-mute-btn ${app.muted ? 'is-muted' : ''}" id="apmute-${pid}"
              onclick="toggleAppMute('${pid}')">
              ${app.muted ? '🔇' : '🔊'}
            </button>
          </div>
        </div>`;
      list.appendChild(card);
    } else {
      // Update only if slider is not being dragged
      const slider = document.getElementById(`apslider-${pid}`);
      if (slider && document.activeElement !== slider) {
        slider.value = app.volume;
      }
      const volEl = document.getElementById(`apvol-${pid}`);
      if (volEl && document.activeElement !== document.getElementById(`apslider-${pid}`)) {
        volEl.textContent = app.volume + '%';
        volEl.className = 'app-vol-display' + (app.muted ? ' muted' : '');
      }
      const muteBtn = document.getElementById(`apmute-${pid}`);
      if (muteBtn) {
        muteBtn.className = 'app-mute-btn' + (app.muted ? ' is-muted' : '');
        muteBtn.textContent = app.muted ? '🔇' : '🔊';
      }
      card.className = 'app-card' + (app.muted ? ' muted-card' : '');
    }
  });
}

function onAppSliderInput(slider, pid) {
  // Update display in real-time while dragging
  const volEl = document.getElementById(`apvol-${pid}`);
  if (volEl) volEl.textContent = slider.value + '%';
  // Debounce the actual API call
  clearTimeout(appVolTimers[pid]);
  appVolTimers[pid] = setTimeout(() => sendAppVol(pid, slider.value), 80);
}

function onAppSliderChange(slider, pid) {
  clearTimeout(appVolTimers[pid]);
  sendAppVol(pid, slider.value);
}

async function sendAppVol(pid, vol) {
  const data = await apiFetch(`/app_set?pid=${pid}&v=${vol}`);
  if (data && data.app) {
    const volEl = document.getElementById(`apvol-${pid}`);
    if (volEl) volEl.textContent = data.app.volume + '%';
  }
}

async function toggleAppMute(pid) {
  const data = await apiFetch(`/app_mute?pid=${pid}`);
  if (data && data.app) {
    const app = data.app;
    const muteBtn = document.getElementById(`apmute-${pid}`);
    const slider = document.getElementById(`apslider-${pid}`);
    const volEl = document.getElementById(`apvol-${pid}`);
    const card = document.querySelector(`.app-card[data-pid="${pid}"]`);
    if (muteBtn) { muteBtn.className = 'app-mute-btn' + (app.muted ? ' is-muted' : ''); muteBtn.textContent = app.muted ? '🔇' : '🔊'; }
    if (slider)  { slider.className  = 'app-slider'   + (app.muted ? ' muted-slider' : ''); }
    if (volEl)   { volEl.className   = 'app-vol-display' + (app.muted ? ' muted' : ''); }
    if (card)    { card.className    = 'app-card'     + (app.muted ? ' muted-card' : ''); }
    showToast(app.muted ? `${app.name} MUTED` : `${app.name} ON`);
  }
}

function startAppPolling() {
  stopAppPolling();
  appPollTimer = setInterval(() => { if (currentTab === 'apps') loadApps(); }, 3000);
}
function stopAppPolling() { if (appPollTimer) { clearInterval(appPollTimer); appPollTimer = null; } }

// ══ On load ══════════════════════════════════════
window.addEventListener("load", () => {
  const saved = localStorage.getItem("vol_server");
  if (saved) { document.getElementById("ipInput").value = saved; connect(); }
  requestAnimationFrame(() => updateFaderPosition(0));
  // init bottom bar display
  document.getElementById('masterBottomBar').style.display = 'flex';
});

window.addEventListener("resize", () => updateFaderPosition(curVol));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
}
</script>

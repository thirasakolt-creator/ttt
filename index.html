<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ปิดงานแจ้งซ่อม</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --card:    #21253a;
    --border:  #2e3350;
    --accent:  #3b7eff;
    --accent2: #00d4aa;
    --warn:    #ff6b35;
    --danger:  #ff4444;
    --text:    #e8ecf4;
    --muted:   #7a82a0;
    --success: #22c55e;
    --radius:  12px;
    --font:    'Sarabun', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-title { flex: 1; font-size: 17px; font-weight: 600; letter-spacing: .3px; }
  .topbar-sub { font-size: 11px; color: var(--muted); font-weight: 400; }

  .status-led {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .3s;
  }
  .status-led.syncing { background: var(--danger); animation: blink .7s infinite; }
  .status-led.ok { background: var(--success); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .search-wrap { padding: 12px 16px 8px; }
  .search-box {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; color: var(--text);
    font-family: var(--font); font-size: 14px; outline: none; transition: border .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .tabs { display: flex; padding: 0 16px; gap: 8px; margin-bottom: 4px; }
  .tab-btn {
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font); font-size: 13px;
    cursor: pointer; transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .job-count { padding: 4px 16px 8px; font-size: 12px; color: var(--muted); }
  .job-count span { color: var(--accent2); font-weight: 600; }

  .job-list { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 10px; }

  .job-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; align-items: stretch;
    cursor: pointer; transition: all .15s; position: relative;
  }
  .job-card:active { transform: scale(.985); }
  .job-card:hover { border-color: var(--accent); }

  .job-img {
    width: 76px; flex-shrink: 0;
    background: #0d0f1a; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .job-img img { width: 100%; height: 100%; object-fit: cover; }
  .job-img .no-img { font-size: 28px; color: var(--border); }

  .job-body { flex: 1; padding: 10px 12px; overflow: hidden; }
  .job-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 4px;
  }
  .job-dept { font-size: 15px; font-weight: 700; color: var(--accent2); letter-spacing: .5px; }
  .job-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .badge-pending  { background: rgba(255,107,53,.15); color: var(--warn); border: 1px solid rgba(255,107,53,.3); }
  .badge-waiting  { background: rgba(59,126,255,.12); color: var(--accent); border: 1px solid rgba(59,126,255,.25); }
  .badge-empty    { background: rgba(122,130,160,.1); color: var(--muted); border: 1px solid var(--border); }

  .job-detail { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .job-meta { font-size: 11px; color: var(--muted); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page { display: none; min-height: 100vh; background: var(--bg); }
  .page.active { display: block; }

  .detail-topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  .back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .detail-title { flex: 1; font-size: 16px; font-weight: 600; }

  .detail-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 100px; }

  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .info-card-head {
    padding: 8px 14px; background: rgba(59,126,255,.08);
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--accent);
    letter-spacing: .5px; text-transform: uppercase;
  }
  .info-row { display: flex; padding: 8px 14px; border-bottom: 1px solid rgba(46,51,80,.5); gap: 8px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 12px; color: var(--muted); flex-shrink: 0; width: 90px; }
  .info-val { font-size: 13px; color: var(--text); flex: 1; word-break: break-word; }
  .info-val.highlight { color: var(--warn); font-weight: 500; }

  .before-img-wrap {
    border-radius: var(--radius); overflow: hidden;
    background: var(--card); border: 1px solid var(--border);
    aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
  }
  .before-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .before-img-wrap .no-img-lg {
    font-size: 48px; color: var(--border);
    flex-direction: column; display: flex; align-items: center; gap: 8px;
  }
  .before-img-wrap .no-img-lg span { font-size: 12px; color: var(--muted); font-family: var(--font); }

  .form-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .form-section-head {
    padding: 8px 14px; background: rgba(0,212,170,.07);
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--accent2);
    letter-spacing: .5px; text-transform: uppercase;
  }
  .form-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .field-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .field-label .req { color: var(--danger); }

  input[type="date"], select, textarea {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; color: var(--text);
    font-family: var(--font); font-size: 14px; outline: none; transition: border .2s;
    -webkit-appearance: none;
  }
  input[type="date"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--card); }
  textarea { resize: vertical; min-height: 72px; }

  .photo-upload-area {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column;
    align-items: center; gap: 10px; cursor: pointer; transition: border .2s;
  }
  .photo-upload-area:hover { border-color: var(--accent2); }
  .photo-upload-area .pu-icon { font-size: 32px; }
  .photo-upload-area .pu-text { font-size: 12px; color: var(--muted); text-align: center; }

  .photo-btns { display: flex; gap: 8px; }
  .photo-btn {
    flex: 1; padding: 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-family: var(--font); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s;
  }
  .photo-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .preview-wrap { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: var(--surface); }
  .preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .preview-del {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,.7); color: #fff; border: none;
    border-radius: 50%; width: 28px; height: 28px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  #fileCamera, #fileGallery { display: none; }

  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px; background: var(--surface);
    border-top: 1px solid var(--border); z-index: 200;
  }
  .save-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-family: var(--font);
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .save-btn:active { transform: scale(.97); }
  .save-btn:disabled { background: var(--border); cursor: not-allowed; }
  .save-btn.saving { background: var(--warn); animation: pulse-btn 1s infinite; }
  @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:.6} }

  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card); color: var(--text);
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    border: 1px solid var(--border); opacity: 0; transition: all .3s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error   { border-color: var(--danger);  color: var(--danger); }

  .sync-banner {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.75); z-index: 500;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  .sync-banner.show { display: flex; }
  .sync-banner .sync-txt { font-size: 14px; color: var(--muted); }
  .sync-banner .sync-progress { width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sync-progress-inner { height: 100%; background: var(--accent); width: 0%; transition: width .5s; border-radius: 2px; }

  /* ── Error banner ── */
  .error-banner {
    margin: 12px 16px; padding: 12px 16px;
    background: rgba(255,68,68,.1); border: 1px solid rgba(255,68,68,.3);
    border-radius: 10px; font-size: 13px; color: var(--danger);
    display: none;
  }
  .error-banner.show { display: block; }
</style>
</head>
<body>

<!-- ═══ PAGE 1 – Job List ═══ -->
<div id="page-list" class="page active">

  <div class="topbar">
    <div style="flex:1">
      <div class="topbar-title">🔧 ปิดงานแจ้งซ่อม</div>
      <div class="topbar-sub">มณีจันทร์รีสอร์ท</div>
    </div>
    <div class="status-led" id="statusLed" title="สถานะ sync"></div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="search-wrap">
    <input class="search-box" type="search" id="searchInput"
           placeholder="🔍  ค้นหา DOC NO / สถานที่ / รายละเอียด..."
           oninput="filterJobs()">
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabAll"     onclick="setTab('all')">ทั้งหมด</button>
    <button class="tab-btn"        id="tabPending" onclick="setTab('รับทราบ')">รับทราบ</button>
    <button class="tab-btn"        id="tabWait"    onclick="setTab('รอจัดซื้ออุปกรณ์')">รอจัดซื้อ</button>
    <button class="tab-btn"        id="tabEmpty"   onclick="setTab('empty')">ใหม่</button>
  </div>

  <div class="job-count" id="jobCount"></div>
  <div class="job-list"  id="jobList">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <span style="font-size:13px;color:var(--muted)">กำลังโหลดข้อมูล…</span>
    </div>
  </div>
</div>

<!-- ═══ PAGE 2 – Detail / Close Job ═══ -->
<div id="page-detail" class="page">

  <div class="detail-topbar">
    <button class="back-btn" onclick="goList()">&#8592;</button>
    <div class="detail-title" id="detailTitle">รายละเอียดงาน</div>
    <div class="status-led" id="statusLed2"></div>
  </div>

  <div class="detail-body">

    <div class="before-img-wrap" id="beforeImgWrap">
      <div class="no-img-lg">📷<span>ไม่มีรูปก่อนซ่อม</span></div>
    </div>

    <div class="info-card">
      <div class="info-card-head">ข้อมูลการแจ้งซ่อม</div>
      <div class="info-row"><span class="info-label">DOC NO.</span><span class="info-val" id="dDocNo">–</span></div>
      <div class="info-row"><span class="info-label">วันที่แจ้ง</span><span class="info-val" id="dDateReport">–</span></div>

        <div>

            <option value="รับทราบ">รับทราบ</option>
            <option value="ติดต่อช่างนอก">ติดต่อช่างนอก</option>
            <option value="ติดต่อช่างนอก , ดำเนินการเรียบร้อย">ติดต่อช่างนอก , ดำเนินการเรียบร้อย</option>
            <option value="รอจัดซื้ออุปกรณ์">รอจัดซื้ออุปกรณ์</option>
            <option value="ยกเลิกการซ่อม">ยกเลิกการซ่อม</option>

        <div>

            <option value="">— เลือกช่าง —</option>

          <label class="field-label">ผู้ช่วยคนที่ 1</label>
          <select id="fTech1">
            <option value="">— ไม่มี —</option>
            <option>ช่างชัย</option><option>ช่างไฟว์</option><option>ช่างโอ</option>
            <option>ช่างต้น</option><option>ช่างแลน</option><option>ช่างโบ้</option><option>ช่างเบียร์</option>
          </select>
        </div>

        <div>
          <label class="field-label">ผู้ช่วยคนที่ 2</label>
          <select id="fTech2">
            <option value="">— ไม่มี —</option>
            <option>ช่างชัย</option><option>ช่างไฟว์</option><option>ช่างโอ</option>
            <option>ช่างต้น</option><option>ช่างแลน</option><option>ช่างโบ้</option><option>ช่างเบียร์</option>
          </select>
        </div>

        <div>
          <label class="field-label">คำแนะนำในการดูแลจากช่าง</label>
          <textarea id="fAdvice" placeholder="บันทึกคำแนะนำ…"></textarea>
        </div>

        <div>
          <label class="field-label">รูปหลังซ่อม</label>
          <div id="photoPreviewWrap" style="display:none" class="preview-wrap">
            <img id="photoPreview" src="" alt="preview">
            <button class="preview-del" onclick="clearPhoto()">✕</button>

          <div id="photoUploadArea" class="photo-upload-area">
            <div class="pu-icon">📷</div>
            <div class="pu-text">เลือกวิธีเพิ่มรูปหลังซ่อม</div>
            <div class="photo-btns">
              <button class="photo-btn" onclick="openCamera()"><span>📸</span> ถ่ายเลย</button>

            </div>

  <div class="save-bar">
    <button class="save-btn" id="saveBtn" onclick="saveJob()">💾 บันทึกปิดงาน</button>

<div class="toast" id="toast"></div>

<div class="sync-banner" id="syncBanner">
  <div class="spinner"></div>

  <div class="sync-progress">
    <div class="sync-progress-inner" id="syncProgressBar"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG – เปลี่ยนตรงนี้เท่านั้น
// ══════════════════════════════════════════
var API_URL = 'https://script.google.com/macros/s/AKfycbymxipvYzg63XJ6uzG37GO-CyGCt88bN2C1b_AAcafvHOOybjNGLvqeCIVdbDDxjcPd/exec';

// ══════════════════════════════════════════
//  แปลง Google Drive URL → ลิงก์รูปตรง
//  รองรับหลาย format:
//    https://drive.google.com/uc?export=view&id=FILE_ID
//    https://drive.google.com/file/d/FILE_ID/view
//    https://lh3.googleusercontent.com/d/FILE_ID  (ใช้ได้แล้ว ไม่ต้องแปลง)
// ══════════════════════════════════════════
function fixDriveUrl(url) {
  if (!url || url.trim() === '') return '';
  url = url.trim();

  // ถ้าเป็น lh3 อยู่แล้ว → ใช้เลย
  if (url.indexOf('lh3.googleusercontent.com') !== -1) return url;

  var fileId = null;

  // format: ?id=FILE_ID หรือ &id=FILE_ID
  var m1 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m1) fileId = m1[1];

  // format: /file/d/FILE_ID/
  if (!fileId) {
    var m2 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m2) fileId = m2[1];
  }

  if (fileId) {
    // ใช้ thumbnail API ซึ่งไม่ block CORS
    return 'https://lh3.googleusercontent.com/d/' + fileId;
  }

  return url; // คืนเดิมถ้าแปลงไม่ได้
}

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
var allJobs      = [];
var filteredJobs = [];
var currentJob   = null;
var currentTab   = 'all';
var photoData    = null;

var CACHE_KEY = 'mj_closejob_cache_v2';
var CACHE_TS  = 'mj_closejob_ts';

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
window.onload = function() {
  setLed('syncing');
  var today = new Date();
  var yy = today.getFullYear();
  var mm = String(today.getMonth()+1).padStart(2,'0');
  var dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('fDateDone').value = yy+'-'+mm+'-'+dd;

  var cached = loadCache();
  if (cached && cached.length > 0) {
    allJobs = cached;
    filterJobs();
    syncData(false);
  } else {
    document.getElementById('syncBanner').classList.add('show');
    syncData(true);
  }
};

// ══════════════════════════════════════════
//  Sync – เรียก AppScript ผ่าน fetch (CORS)
// ══════════════════════════════════════════
function syncData(isFirst) {
  setLed('syncing');
  if (isFirst) updateSyncProgress(20);

  fetch(API_URL + '?action=getPendingJobs', { method: 'GET' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(res) {
      if (res.ok) {
        // แปลง URL รูปทุกรายการ
        allJobs = res.jobs.map(function(j) {
          j.imgBeforeUrl = fixDriveUrl(j.imgBeforeUrl || '');
          return j;
        });
        saveCache(allJobs);
        if (isFirst) {
          updateSyncProgress(100);
          setTimeout(function() {
            document.getElementById('syncBanner').classList.remove('show');
          }, 500);
        }
        filterJobs();
        setLed('ok');
        hideError();
      } else {
        throw new Error(res.msg || 'unknown error');
      }
    })
    .catch(function(err) {
      setLed('ok');
      if (isFirst) document.getElementById('syncBanner').classList.remove('show');
      showError('⚠️ โหลดข้อมูลไม่สำเร็จ: ' + err.message);
      showToast('❌ ' + err.message, 'error');
    });
}

function updateSyncProgress(pct) {
  document.getElementById('syncProgressBar').style.width = pct + '%';
  document.getElementById('syncTxt').textContent =
    pct < 50 ? 'กำลังดึงข้อมูล…' : pct < 90 ? 'กำลังประมวลผล…' : 'เสร็จแล้ว!';
}

// ══════════════════════════════════════════
//  Cache
// ══════════════════════════════════════════
function saveCache(jobs) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(jobs)); localStorage.setItem(CACHE_TS, Date.now()); } catch(e) {}
}
function loadCache() {
  try { var d = localStorage.getItem(CACHE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

// ══════════════════════════════════════════
//  LED / Error
// ══════════════════════════════════════════
function setLed(state) {
  ['statusLed','statusLed2'].forEach(function(id) {
    var l = document.getElementById(id);
    if (!l) return;
    l.className = 'status-led' + (state==='syncing' ? ' syncing' : state==='ok' ? ' ok' : '');
  });
}
function showError(msg) {
  var el = document.getElementById('errorBanner');
  el.textContent = msg; el.classList.add('show');
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('show');
}

// ══════════════════════════════════════════
//  Tab
// ══════════════════════════════════════════
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var ids = { all:'tabAll', 'รับทราบ':'tabPending', 'รอจัดซื้ออุปกรณ์':'tabWait', empty:'tabEmpty' };
  var el = document.getElementById(ids[tab]);
  if (el) el.classList.add('active');
  filterJobs();
}

// ══════════════════════════════════════════
//  Filter & Render
// ══════════════════════════════════════════
function filterJobs() {
  var kw = document.getElementById('searchInput').value.trim().toLowerCase();

  filteredJobs = allJobs.filter(function(j) {
    if (currentTab === 'รับทราบ'         && j.progress !== 'รับทราบ')         return false;
    if (currentTab === 'รอจัดซื้ออุปกรณ์' && j.progress !== 'รอจัดซื้ออุปกรณ์') return false;
    if (currentTab === 'empty'            && j.progress !== '')               return false;
    if (!kw) return true;
    return (
      (j.docNo      || '').toLowerCase().includes(kw) ||
      (j.location   || '').toLowerCase().includes(kw) ||
      (j.detail     || '').toLowerCase().includes(kw) ||
      (j.dept       || '').toLowerCase().includes(kw) ||
      (j.reporter   || '').toLowerCase().includes(kw)
    );
  });

  renderList();
}

function renderList() {
  var el = document.getElementById('jobList');

  if (filteredJobs.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>ไม่พบงานที่ตรงกัน</p></div>';
    document.getElementById('jobCount').innerHTML = 'ไม่พบรายการ';
    return;
  }

  document.getElementById('jobCount').innerHTML = 'พบ <span>' + filteredJobs.length + '</span> รายการ';

  el.innerHTML = filteredJobs.map(function(j, idx) {
    var badgeCls = j.progress === 'รับทราบ'         ? 'badge-pending'
                 : j.progress === 'รอจัดซื้ออุปกรณ์' ? 'badge-waiting'
                 : 'badge-empty';
    var badgeTxt = j.progress || 'ใหม่';

    var imgHtml = j.imgBeforeUrl
      ? '<img src="' + escHtml(j.imgBeforeUrl) + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<span class=no-img>📷</span>\'">'
      : '<span class="no-img">📷</span>';

    return '<div class="job-card" onclick="openDetail(' + idx + ')">' +
      '<div class="job-img">' + imgHtml + '</div>' +
      '<div class="job-body">' +
        '<div class="job-header">' +
          '<span class="job-dept">' + escHtml(j.dept) + '</span>' +
          '<span class="job-badge ' + badgeCls + '">' + escHtml(badgeTxt) + '</span>' +
        '</div>' +
        '<div class="job-detail">' + escHtml(j.detail || j.location) + '</div>' +
        '<div class="job-meta">#' + escHtml(j.docNo) + ' · ' + escHtml(j.location) + ' · ' + escHtml(j.dateReport) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════
//  Open Detail
// ══════════════════════════════════════════
function openDetail(idx) {
  currentJob = filteredJobs[idx];
  var j = currentJob;

  document.getElementById('detailTitle').textContent = j.dept + ' – ' + j.location;
  document.getElementById('dDocNo').textContent      = j.docNo;
  document.getElementById('dDateReport').textContent = j.dateReport;
  document.getElementById('dDept').textContent       = j.dept;
  document.getElementById('dReporter').textContent   = j.reporter;
  document.getElementById('dLocation').textContent   = j.location;
  document.getElementById('dType').textContent       = j.type;
  document.getElementById('dDetail').textContent     = j.detail;
  document.getElementById('dProgress').textContent   = j.progress || '(ใหม่)';

  // รูปก่อนซ่อม – URL ถูกแปลงแล้วตอน sync
  var wrap = document.getElementById('beforeImgWrap');
  if (j.imgBeforeUrl) {
    wrap.innerHTML = '<img src="' + escHtml(j.imgBeforeUrl) +
      '" onerror="this.parentElement.innerHTML=\'<div class=no-img-lg>📷<span>โหลดรูปไม่ได้</span></div>\'">';
  } else {
    wrap.innerHTML = '<div class="no-img-lg">📷<span>ไม่มีรูปก่อนซ่อม</span></div>';
  }

  document.getElementById('fTechMain').value = j.techMain || '';
  document.getElementById('fTech1').value    = j.tech1    || '';
  document.getElementById('fTech2').value    = j.tech2    || '';
  document.getElementById('fAdvice').value   = '';
  clearPhoto();

  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  window.scrollTo(0,0);
}

function goList() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('page-list').classList.add('active');
}

// ══════════════════════════════════════════
//  Photo
// ══════════════════════════════════════════
function openCamera()  { document.getElementById('fileCamera').click(); }
function openGallery() { document.getElementById('fileGallery').click(); }

function handlePhoto(input) {
  var file = input.files[0];
  if (!file) return;
  // compress ก่อนถ้าไฟล์ใหญ่เกิน 2MB
  if (file.size > 2 * 1024 * 1024) {
    compressImage(file, 0.7, function(dataUrl) { applyPhoto(dataUrl); });
  } else {
    var reader = new FileReader();
    reader.onload = function(e) { applyPhoto(e.target.result); };
    reader.readAsDataURL(file);
  }
  input.value = '';
}

function applyPhoto(dataUrl) {
  document.getElementById('photoPreview').src = dataUrl;
  document.getElementById('photoPreviewWrap').style.display = 'block';
  document.getElementById('photoUploadArea').style.display  = 'none';
  var parts = dataUrl.split(',');
  var mime  = parts[0].match(/:(.*?);/)[1];
  photoData = { base64: parts[1], mime: mime };
}

function compressImage(file, quality, cb) {
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var maxW = 1280, maxH = 960;
    var w = img.width, h = img.height;
    if (w > maxW) { h = h * maxW / w; w = maxW; }
    if (h > maxH) { w = w * maxH / h; h = maxH; }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function clearPhoto() {
  photoData = null;
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoUploadArea').style.display  = 'flex';
  document.getElementById('photoPreview').src = '';
}

// ══════════════════════════════════════════
//  Save Job – ส่งผ่าน fetch POST
// ══════════════════════════════════════════
function saveJob() {
  var progress = document.getElementById('fProgress').value;
  var dateDone = document.getElementById('fDateDone').value;

  if (!progress) { showToast('⚠️ กรุณาเลือกความคืบหน้า', 'error'); return; }
  if (!dateDone) { showToast('⚠️ กรุณาเลือกวันที่เสร็จ', 'error'); return; }

  var payload = {
    action   : 'saveJob',
    rowNum   : currentJob.rowNum,
    docNo    : currentJob.docNo,
    dateDone : dateDone,
    progress : progress,
    techMain : document.getElementById('fTechMain').value,
    tech1    : document.getElementById('fTech1').value,
    tech2    : document.getElementById('fTech2').value,
    advice   : document.getElementById('fAdvice').value,
    imgBase64: photoData ? photoData.base64 : '',
    imgMime  : photoData ? photoData.mime   : ''
  };

  // กลับหน้าแรกทันที
  goList();

  // อัพเดท cache ทันที
  var closedStatuses = ['ดำเนินการเรียบร้อย', 'ติดต่อช่างนอก , ดำเนินการเรียบร้อย', 'ยกเลิกการซ่อม'];
  if (closedStatuses.indexOf(progress) !== -1) {
    allJobs = allJobs.filter(function(j) { return j.rowNum !== currentJob.rowNum; });
  } else {
    allJobs = allJobs.map(function(j) {
      if (j.rowNum === currentJob.rowNum) j.progress = progress;
      return j;
    });
  }
  saveCache(allJobs);
  filterJobs();

  setLed('syncing');
  showToast('⏳ กำลังบันทึก…', '');

  fetch(API_URL, {
    method : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body   : JSON.stringify(payload)
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(res) {
    if (res.ok) {
      showToast('✅ บันทึกสำเร็จ!', 'success');
      syncData(false);
    } else {
      throw new Error(res.msg || 'บันทึกล้มเหลว');
    }
  })
  .catch(function(err) {
    showToast('❌ ' + err.message, 'error');
    setLed('ok');
  });
}

// ══════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show ' + (type || '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 3500);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f2027">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>มณีจันทร์ PM</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d1b2a;
  --surface:   #1a2d42;
  --surface2:  #243d57;
  --accent:    #00c9a7;
  --accent2:   #0099ff;
  --danger:    #ff4d6d;
  --text:      #e8f4f8;
  --text2:     #8dafc8;
  --bubble-in: #1e3a52;
  --bubble-out:#00513f;
  --radius:    18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* === HEADER === */
.header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  z-index: 10;
  flex-shrink: 0;
}
.header-avatar {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-name { font-weight: 600; font-size: 15px; letter-spacing: 0.3px; }
.header-status { font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 4px; }
.status-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* === CHAT AREA === */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

/* === MESSAGES === */
.msg { display: flex; flex-direction: column; max-width: 85%; animation: fadeUp 0.25s ease; }
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14.5px;
  line-height: 1.55;
  word-break: break-word;
}
.msg.bot .bubble {
  background: var(--bubble-in);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.msg.user .bubble {
  background: var(--bubble-out);
  border-bottom-right-radius: 4px;
  color: #e0fff8;
}
.msg-time { font-size: 11px; color: var(--text2); margin-top: 3px; padding: 0 4px; }
.msg.user .msg-time { text-align: right; }

/* === MENU BUTTONS === */
.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
  width: 100%;
  max-width: 320px;
}
.btn-grid.single { grid-template-columns: 1fr; }
.btn-menu {
  background: var(--surface2);
  border: 1px solid rgba(0,201,167,0.25);
  color: var(--text);
  padding: 11px 14px;
  border-radius: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-menu:active { transform: scale(0.96); background: var(--accent); color: #000; }
.btn-menu.full { grid-column: 1/-1; }
.btn-menu.danger { border-color: rgba(255,77,109,0.3); }
.btn-menu.danger:active { background: var(--danger); }
.btn-menu.success { border-color: rgba(0,201,167,0.4); background: rgba(0,201,167,0.1); }
.btn-menu.success:active { background: var(--accent); color: #000; }

/* === CONFIRM CARD === */
.confirm-card {
  background: var(--surface2);
  border: 1px solid rgba(0,201,167,0.2);
  border-radius: 14px;
  padding: 14px;
  margin-top: 6px;
  font-size: 13.5px;
  line-height: 1.8;
}
.confirm-card .row { display: flex; gap: 8px; }
.confirm-card .label { color: var(--text2); min-width: 100px; }
.confirm-card .val { color: var(--text); font-weight: 500; }

/* === INPUT AREA === */
.input-area {
  background: var(--surface);
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
.input-wrap { flex: 1; position: relative; }
textarea#msgInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  font-size: 15px;
  padding: 10px 16px;
  resize: none;
  outline: none;
  max-height: 100px;
  min-height: 42px;
  line-height: 1.4;
  overflow-y: auto;
  transition: border-color 0.2s;
}
textarea#msgInput:focus { border-color: var(--accent); }
textarea#msgInput::placeholder { color: var(--text2); }

.btn-send {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 50%;
  color: #000; font-size: 18px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.btn-send:active { transform: scale(0.9); }
.btn-send:disabled { opacity: 0.4; }

/* === TYPING INDICATOR === */
.typing { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
.typing span {
  width: 7px; height: 7px;
  background: var(--text2); border-radius: 50%;
  animation: typing 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* === SCROLLBAR FIX === */
.disabled-input textarea { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-avatar">🏨</div>
  <div class="header-info">
    <div class="header-name">มณีจันทร์รีสอร์ท PM</div>
    <div class="header-status"><span class="status-dot"></span> ออนไลน์</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-area" id="chatArea"></div>

<!-- INPUT -->
<div class="input-area" id="inputArea">
  <div class="input-wrap">
    <textarea id="msgInput" placeholder="พิมพ์ข้อมูลที่นี่..." rows="1"></textarea>
  </div>
  <button class="btn-send" id="sendBtn" onclick="sendUserMsg()">➤</button>
</div>

<script>
// ============================================================
// CONFIG — เปลี่ยน URL ตรงนี้หลัง Deploy Apps Script
// ============================================================
const APPS_SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMUpvVWzseI2J_JNx_WgT6WDqIa2B6B9dgyug1pCwBgScYlNRDxd3lrIjPdDMT5Yb2PZoGhck2ZZBcALkEpjK6NubuxAQQbx-5SftyqiaqvoDnZEveWdIudf6GRUPJgNaVDFy0bNxZ9xhBjeyVMKyMbKLvJPI4e4UrGQAwJonUZAE8pTCJ9cBkAn03aoNfT-a3o6LUXwsMvgcPhP-JvWNK3z2qcksEv_ClCOhsssxUpY4i1OGl3hgyXNwJbLxI8shmut-M8DOoSDc-DDcSeFw0B-c36Pswct49DN8QJh&lib=MDXKGWOMys0ku3wewHCWlL02LyERNim05";

// ============================================================
// STATE
// ============================================================
let state = {
  step: "menu",        // menu | wait_ac | wait_exhaust | wait_filter | confirm
  pmType: null,
  pendingData: null,
  techName: null,
};

// ============================================================
// INIT
// ============================================================
window.onload = () => {
  setTimeout(() => {
    showTyping(600, () => sendBotMenu());
  }, 400);

  const input = document.getElementById("msgInput");
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendUserMsg(); }
  });
};

// ============================================================
// SEND BOT MAIN MENU
// ============================================================
function sendBotMenu() {
  state.step = "menu";
  appendBotMsg("🏨 <b>มณีจันทร์รีสอร์ท</b><br>เลือกประเภทงาน PM:", [
    [
      { label: "🌬️ PM แอร์",       action: "pm_ac" },
      { label: "💨 พัดลมดูดอากาศ",  action: "pm_exhaust" },
    ],
    [
      { label: "🚰 กรองปากก๊อก",    action: "pm_filter" },
      { label: "📋 PM อื่นๆ",        action: "pm_other" },
    ],
    [
      { label: "📊 รายงานวันนี้",    action: "report", cls: "full" },
    ]
  ]);
  setInputEnabled(false);
}

// ============================================================
// HANDLE BUTTON PRESS
// ============================================================
function handleAction(action, el) {
  // ปิดปุ่มทั้งหมดหลังกด
  disableButtons(el);

  if (action === "pm_ac") {
    state.pmType = "AC"; state.step = "wait_ac";
    appendUserMsg("🌬️ PM แอร์");
    showTyping(500, () => {
      appendBotMsg(
        "✅ <b>PM แอร์</b> — พิมพ์ข้อมูลได้เลยครับ\n\n" +
        "📝 <b>ตัวอย่าง:</b>\n" +
        "<code>ห้อง 201 กระแสก่อน 14.5 กระแสหลัง 15 น้ำยาก่อน 135 น้ำยาหลัง 135 ช่างโอ</code>\n\n" +
        "💡 ส่วนที่ไม่พิมพ์ → บันทึกเป็น <b>ปกติ</b> อัตโนมัติ"
      );
      setInputEnabled(true);
    });
    return;
  }

  if (action === "pm_exhaust") {
    state.pmType = "EXHAUST"; state.step = "wait_exhaust";
    appendUserMsg("💨 พัดลมดูดอากาศ");
    showTyping(400, () => {
      appendBotMsg("💨 <b>พัดลมดูดอากาศ</b>\n\nพิมพ์ได้เลยครับ เช่น:\n<code>ห้อง 201 ทำแล้ว ช่างโอ</code>");
      setInputEnabled(true);
    });
    return;
  }

  if (action === "pm_filter") {
    state.pmType = "FILTER"; state.step = "wait_filter";
    appendUserMsg("🚰 กรองปากก๊อก");
    showTyping(400, () => {
      appendBotMsg("🚰 <b>กรองปากก๊อก</b>\n\nพิมพ์ได้เลยครับ เช่น:\n<code>ห้อง 201 ทำแล้ว ช่างโอ</code>");
      setInputEnabled(true);
    });
    return;
  }

  if (action === "pm_other") {
    state.pmType = "OTHER"; state.step = "wait_other";
    appendUserMsg("📋 PM อื่นๆ");
    showTyping(400, () => {
      appendBotMsg("📋 <b>PM อื่นๆ</b>\n\nพิมพ์รายละเอียดได้เลยครับ");
      setInputEnabled(true);
    });
    return;
  }

  if (action === "report") {
    appendUserMsg("📊 รายงานวันนี้");
    showTyping(800, () => fetchReport());
    return;
  }

  if (action === "confirm_save") {
    appendUserMsg("✅ ยืนยันบันทึก");
    showTyping(600, () => saveData());
    return;
  }

  if (action === "cancel") {
    appendUserMsg("❌ ยกเลิก");
    showTyping(400, () => {
      state = { step: "menu", pmType: null, pendingData: null, techName: null };
      appendBotMsg("ยกเลิกแล้วครับ");
      setTimeout(() => sendBotMenu(), 300);
    });
    return;
  }
}

// ============================================================
// HANDLE USER TEXT INPUT
// ============================================================
function sendUserMsg() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text) return;

  input.value = ""; input.style.height = "auto";
  appendUserMsg(text);
  setInputEnabled(false);

  if (state.step === "wait_ac") {
    showTyping(700, () => processACText(text));
  } else if (state.step === "wait_exhaust" || state.step === "wait_filter") {
    showTyping(500, () => processSimpleText(text));
  } else if (state.step === "wait_other") {
    showTyping(500, () => {
      appendBotMsg("📋 บันทึกหมายเหตุแล้วครับ");
      setTimeout(() => sendBotMenu(), 500);
    });
  } else {
    showTyping(400, () => sendBotMenu());
  }
}

// ============================================================
// PROCESS AC TEXT (Keyword Matching)
// ============================================================
function processACText(text) {
  // ดึง Lookup Table แล้ว parse
  fetchLookupAndParse(text, (parsed) => {
    if (!parsed["ห้อง"]) {
      appendBotMsg("⚠️ ไม่พบหมายเลขห้องครับ\n\nกรุณาพิมพ์ใหม่ เช่น:\n<code>ห้อง 201 กระแสก่อน 14.5</code>");
      setInputEnabled(true);
      return;
    }

    // ค่า default
    ["คอมเพรสเซอร์","คอนแทรคเตอร์","สายไฟ_ร้อน","พัดลม",
     "อีวาพอเรเตอร์","ถาดน้ำทิ้ง","สายไฟ_เย็น","ท่อ_HIGH",
     "ท่อ_LOW","การจับยึด","แผ่นกรอง","ท่อหน้ากาก","ทำความสะอาด"
    ].forEach(k => { if (!parsed[k]) parsed[k] = "ปกติ"; });
    if (!parsed["วันที่"])         parsed["วันที่"]         = formatDate();
    if (!parsed["พัดลมดูดอากาศ"]) parsed["พัดลมดูดอากาศ"] = "-";
    if (!parsed["กรองปากก๊อก"])   parsed["กรองปากก๊อก"]   = "-";

    state.pendingData = parsed;
    state.step = "confirm";

    // แสดง confirm card
    showConfirm(parsed);
  });
}

function processSimpleText(text) {
  const room = extractRoom(text);
  if (!room) {
    appendBotMsg("⚠️ ไม่พบหมายเลขห้องครับ\nเช่น: <code>ห้อง 201 ทำแล้ว ช่างโอ</code>");
    setInputEnabled(true);
    return;
  }
  const done = /ทำ|เสร็จ|done|ok|ทำแล้ว/i.test(text) ? "ทำ" : "ไม่ทำ";
  const tech = extractTechnician(text);
  const data = { "ห้อง": room, "วันที่": formatDate(), "ผู้ปฏิบัติงาน": tech || "-" };
  if (state.step === "wait_exhaust") data["พัดลมดูดอากาศ"] = done;
  if (state.step === "wait_filter")  data["กรองปากก๊อก"]   = done;

  state.pendingData = data;
  state.step = "confirm";
  showConfirm(data);
}

// ============================================================
// SHOW CONFIRM
// ============================================================
function showConfirm(data) {
  const icons = {"ห้อง":"🏠","วันที่":"📅","AMP_ก่อน":"⚡","AMP_หลัง":"⚡",
    "น้ำยา_R32_ก่อน":"🌡️","น้ำยา_R32_หลัง":"🌡️","ผู้ปฏิบัติงาน":"👤",
    "พัดลมดูดอากาศ":"💨","กรองปากก๊อก":"🚰"};
  const order = ["ห้อง","วันที่","AMP_ก่อน","AMP_หลัง",
    "น้ำยา_R32_ก่อน","น้ำยา_R32_หลัง","ผู้ปฏิบัติงาน","พัดลมดูดอากาศ","กรองปากก๊อก"];

  let rows = "";
  order.forEach(k => {
    if (data[k] !== undefined && data[k] !== "")
      rows += `<div class="row"><span class="label">${icons[k]||"•"} ${k}</span><span class="val">${data[k]}</span></div>`;
  });

  const html = `📋 <b>ตรวจสอบข้อมูล:</b>
<div class="confirm-card">${rows}</div>`;

  appendBotMsg(html, [
    [
      { label: "✅ บันทึก",  action: "confirm_save", cls: "success" },
      { label: "❌ ยกเลิก", action: "cancel",       cls: "danger" }
    ]
  ]);
}

// ============================================================
// SAVE DATA → Apps Script
// ============================================================
async function saveData() {
  if (!state.pendingData) { sendBotMenu(); return; }

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "save", data: state.pendingData })
    });
    const json = await res.json();

    if (json.ok) {
      const summary = formatSummaryText(state.pendingData);
      appendBotMsg("✅ <b>บันทึกสำเร็จ!</b>\n\n" + summary);
    } else {
      appendBotMsg("⚠️ บันทึกไม่สำเร็จ: " + (json.error || "ลองใหม่ครับ"));
    }
  } catch(e) {
    appendBotMsg("⚠️ เชื่อมต่อไม่ได้ครับ กรุณาลองใหม่");
  }

  state = { step: "menu", pmType: null, pendingData: null };
  setTimeout(() => sendBotMenu(), 600);
}

// ============================================================
// FETCH REPORT
// ============================================================
async function fetchReport() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=report");
    const json = await res.json();
    appendBotMsg(json.message || "ไม่มีข้อมูล");
  } catch(e) {
    appendBotMsg("⚠️ ดึงรายงานไม่ได้ครับ");
  }
  setTimeout(() => sendBotMenu(), 600);
}

// ============================================================
// FETCH LOOKUP TABLE & PARSE
// ============================================================
let _lookupCache = null;

async function fetchLookupAndParse(text, cb) {
  if (!_lookupCache) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + "?action=lookup");
      _lookupCache = await res.json();
    } catch(e) {
      _lookupCache = {};
    }
  }
  cb(parseText(text, _lookupCache));
}

function parseText(text, lookup) {
  const result = {};
  const tokens = text.split(/\s+/);
  for (let i = 0; i < tokens.length; i++) {
    const token = tokens[i].toLowerCase().replace(/[^\u0e00-\u0e7fa-z0-9]/g, "");
    const field = lookup[token];
    if (field) {
      const next = tokens[i+1];
      if (next) {
        if (!isNaN(parseFloat(next))) { result[field] = parseFloat(next); i++; }
        else if (field === "ผู้ปฏิบัติงาน" || field === "แผนก") { result[field] = next; i++; }
      }
    }
  }
  if (!result["ห้อง"])           result["ห้อง"]          = extractRoom(text);
  if (!result["ผู้ปฏิบัติงาน"]) result["ผู้ปฏิบัติงาน"] = extractTechnician(text);
  return result;
}

function extractRoom(text) {
  const m = text.match(/(?:ห้อง|room|ห\.|rm\.?)\s*(\d{3})/i) || text.match(/\b([1-3]\d{2})\b/);
  return m ? m[1] : null;
}
function extractTechnician(text) {
  const m = text.match(/(?:ช่าง|tech|ผู้ปฏิบัติงาน|ทำโดย|by)\s*([ก-๙a-zA-Z]+)/i);
  return m ? m[1] : null;
}

// ============================================================
// UI HELPERS
// ============================================================
function appendBotMsg(html, buttons) {
  const area = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "msg bot";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = html.replace(/\n/g, "<br>");
  wrap.appendChild(bubble);

  if (buttons) {
    buttons.forEach(row => {
      const grid = document.createElement("div");
      grid.className = "btn-grid";
      row.forEach(btn => {
        const b = document.createElement("button");
        b.className = "btn-menu " + (btn.cls || "");
        b.innerHTML = btn.label;
        b.onclick = () => handleAction(btn.action, b);
        grid.appendChild(b);
      });
      wrap.appendChild(grid);
    });
  }

  const time = document.createElement("div");
  time.className = "msg-time";
  time.textContent = getTime();
  wrap.appendChild(time);

  area.appendChild(wrap);
  scrollBottom();
}

function appendUserMsg(text) {
  const area = document.getElementById("chatArea");
  const wrap = document.createElement("div");
  wrap.className = "msg user";
  wrap.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function showTyping(delay, cb) {
  const area = document.getElementById("chatArea");
  const el   = document.createElement("div");
  el.className = "msg bot";
  el.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(el);
  scrollBottom();
  setTimeout(() => { el.remove(); cb(); }, delay);
}

function disableButtons(clickedEl) {
  const parent = clickedEl.closest(".msg");
  if (parent) parent.querySelectorAll(".btn-menu").forEach(b => {
    b.disabled = true; b.style.opacity = b === clickedEl ? "1" : "0.4";
  });
}

function setInputEnabled(enabled) {
  const input = document.getElementById("msgInput");
  const btn   = document.getElementById("sendBtn");
  input.disabled = !enabled;
  btn.disabled   = !enabled;
  if (enabled) setTimeout(() => input.focus(), 100);
}

function scrollBottom() {
  const area = document.getElementById("chatArea");
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}

function formatDate() {
  const d = new Date();
  return `${d.getDate().toString().padStart(2,"0")}/${(d.getMonth()+1).toString().padStart(2,"0")}/${d.getFullYear()+543}`;
}

function formatSummaryText(data) {
  const order = ["ห้อง","วันที่","AMP_ก่อน","AMP_หลัง","น้ำยา_R32_ก่อน","น้ำยา_R32_หลัง","ผู้ปฏิบัติงาน"];
  return order.filter(k => data[k] !== undefined && data[k] !== "")
    .map(k => `• <b>${k}:</b> ${data[k]}`).join("<br>");
}
